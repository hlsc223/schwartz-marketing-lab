backend:
  name: github
  repo: hlsc223/schwartz-marketing-lab
  branch: main

# GitHub OAuth (via Netlify's auth provider) handles authentication — every
# edit you make in this CMS becomes a real git commit to the repo, so nothing
# happens outside the GitHub-based workflow. Logging in requires push access
# to the repo on GitHub.
publish_mode: simple

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta Title (optional — overrides the title above in browser tabs/search results; leave blank to just use the title)", name: "metaTitle", widget: "string", required: false }
      - { label: "Description (meta description)", name: "description", widget: "text" }
      - { label: "Excerpt (subhead shown under the title)", name: "excerpt", widget: "text", required: false }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Updated Date", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "seo"
    label: "Page SEO (Titles & Meta Descriptions)"
    description: "Meta title and meta description for the homepage and service pages. Body copy and layout stay locked in code — this only controls what shows in Google/AI search results and browser tabs."
    files:
      - name: "home"
        label: "Homepage"
        file: "src/content/seo/home.yaml"
        fields:
          - { label: "Meta Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
      - name: "answer-engine-optimization"
        label: "Service — SEO & AEO"
        file: "src/content/seo/answer-engine-optimization.yaml"
        fields:
          - { label: "Meta Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
      - name: "pr-media"
        label: "Service — PR & Media"
        file: "src/content/seo/pr-media.yaml"
        fields:
          - { label: "Meta Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
      - name: "executive-authority"
        label: "Service — Executive Authority"
        file: "src/content/seo/executive-authority.yaml"
        fields:
          - { label: "Meta Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
      - name: "content-systems"
        label: "Service — Content Systems"
        file: "src/content/seo/content-systems.yaml"
        fields:
          - { label: "Meta Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
